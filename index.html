<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corgi Capital</title>
  <meta name="description" content="Corgi Capital" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0b0b0b;
      --ivory: #f4efe5;
      --gold: #d3ad63;
      --gold-soft: #c59b49;
      --gold-dim: rgba(211, 173, 99, 0.66);
      --gold-line: rgba(211, 173, 99, 0.30);
      --edge-shadow: rgba(0, 0, 0, 0.12);
      --transition: 620ms cubic-bezier(.16,1,.3,1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--ivory);
    }

    body {
      font-family: 'Playfair Display', serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.025), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,0.014), rgba(255,255,255,0) 38%),
        var(--black);
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 54%, var(--edge-shadow) 100%);
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      z-index: 4;
      opacity: 0;
      animation: fadeIn 0.9s ease 0.8s forwards;
    }

    .c-tl { top: 16px; left: 16px; border-top: 1px solid var(--gold-line); border-left: 1px solid var(--gold-line); }
    .c-tr { top: 16px; right: 16px; border-top: 1px solid var(--gold-line); border-right: 1px solid var(--gold-line); }
    .c-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--gold-line); border-left: 1px solid var(--gold-line); }
    .c-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--gold-line); border-right: 1px solid var(--gold-line); }

    .hero {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(22px, 4vw, 44px) clamp(20px, 5vw, 72px) clamp(24px, 4vw, 40px);
    }

    .top,
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      font-family: 'Inconsolata', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(9px, 0.8vw, 12px);
      color: var(--gold-dim);
      opacity: 0;
      animation: fadeUp 0.95s cubic-bezier(.16,1,.3,1) forwards;
    }

    .top { animation-delay: 0.12s; }
    .bottom { align-items: flex-end; animation-delay: 0.24s; }

    .wordmark,
    .meta,
    .contact {
      position: relative;
    }

    .wordmark {
      color: var(--gold);
      letter-spacing: 0.22em;
      white-space: nowrap;
    }

    .meta {
      line-height: 1.85;
      white-space: nowrap;
    }

    .contact {
      color: var(--gold-dim);
      text-decoration: none;
      padding-bottom: 4px;
      white-space: nowrap;
      transition: color 0.25s ease;
    }

    .contact::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.35s cubic-bezier(.16,1,.3,1);
    }

    .contact:hover { color: var(--gold); }
    .contact:hover::after { width: 100%; }

    .wordmark:hover::after,
    .meta:hover::after,
    .contact:hover::before {
      content: "🐾";
      position: absolute;
      font-size: 11px;
      line-height: 1;
    }

    .wordmark:hover::after {
      margin-left: 7px;
      top: 0;
    }

    .meta:hover::after {
      margin-left: 8px;
      bottom: 2px;
    }

    .contact:hover::before {
      left: -18px;
      top: 1px;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-5vh);
      min-width: 0;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(211,173,99,0.9), transparent);
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
    }

    .divider.topline { margin-bottom: 34px; animation-delay: 0.45s; }
    .divider.bottomline { margin-top: 34px; animation-delay: 0.95s; }

    .stack {
      position: relative;
      min-height: clamp(170px, 24vw, 320px);
      width: 100%;
      display: grid;
      place-items: center;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(16px) scale(0.985);
      transition:
        opacity var(--transition),
        transform var(--transition);
      pointer-events: none;
    }

    .panel.active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .headline {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(56px, 9.2vw, 150px);
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .headline.gold {
      color: var(--gold);
      text-shadow: 0 0 24px rgba(211,173,99,0.12);
    }

    .tagline {
      margin: 0;
      font-family: 'Inconsolata', monospace;
      font-size: clamp(12px, 1vw, 16px);
      letter-spacing: 0.08em;
      color: var(--gold-soft);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.82; }
    }

    @media (min-width: 1440px) {
      .center { transform: translateY(-6vh); }
      .headline { font-size: min(9vw, 160px); }
    }

    @media (max-width: 900px) {
      .center { transform: translateY(-2vh); }
      .headline { font-size: clamp(48px, 10.8vw, 106px); }
      .stack { min-height: 160px; }
    }

    @media (max-width: 640px) {
      .hero {
        padding: 22px 18px 24px;
      }

      .center { transform: none; }

      .headline {
        font-size: clamp(40px, 12.6vw, 74px);
        line-height: 0.95;
        letter-spacing: 0.04em;
      }

      .divider {
        height: 38px;
      }

      .divider.topline { margin-bottom: 24px; }
      .divider.bottomline { margin-top: 24px; }

      .top,
      .bottom {
        letter-spacing: 0.14em;
        font-size: 9px;
      }

      .corner {
        width: 18px;
        height: 18px;
      }

      .stack { min-height: 132px; }

      .tagline { font-size: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition-duration: 0ms !important;
        scroll-behavior: auto !important;
      }
      .top, .bottom, .corner, .divider { opacity: 1 !important; transform: none !important; }
      .panel { opacity: 0; transform: none; }
      .panel.active { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <main class="hero">
    <header class="top">
      <div class="wordmark">Corgi Capital</div>
    </header>

    <section class="center" aria-label="Hero">
      <div class="divider topline"></div>

      <div class="stack" aria-live="polite">
        <div class="panel active" id="stage1">
          <h1 class="headline">We Know Something</h1>
        </div>
        <div class="panel" id="stage2">
          <h1 class="headline gold">You Don&apos;t</h1>
        </div>
        <div class="panel" id="stage3">
          <div class="tagline">Selective Capital</div>
        </div>
      </div>

      <div class="divider bottomline"></div>
    </section>

    <footer class="bottom">
      <div class="meta">40.7128° N<br>74.0060° W</div>
      <a class="contact" href="mailto:hello@corgi-capital.com">hello@corgi-capital.com</a>
    </footer>
  </main>

  <script>
    const stages = [
      document.getElementById('stage1'),
      document.getElementById('stage2'),
      document.getElementById('stage3')
    ];

    let currentStage = 0;
    let animating = false;
    let touchStartY = null;

    function renderStage(index) {
      stages.forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    function goToStage(nextIndex) {
      if (nextIndex < 0 || nextIndex >= stages.length || nextIndex === currentStage || animating) {
        return;
      }
      animating = true;
      currentStage = nextIndex;
      renderStage(currentStage);
      window.setTimeout(() => {
        animating = false;
      }, 700);
    }

    function handleStep(direction) {
      if (direction > 0) {
        goToStage(currentStage + 1);
      } else if (direction < 0) {
        goToStage(currentStage - 1);
      }
    }

    window.addEventListener('wheel', (event) => {
      event.preventDefault();
      if (Math.abs(event.deltaY) < 8) return;
      handleStep(event.deltaY);
    }, { passive: false });

    window.addEventListener('keydown', (event) => {
      if (['ArrowDown', 'PageDown', 'Space'].includes(event.key)) {
        event.preventDefault();
        handleStep(1);
      }
      if (['ArrowUp', 'PageUp'].includes(event.key)) {
        event.preventDefault();
        handleStep(-1);
      }
    });

    window.addEventListener('touchstart', (event) => {
      if (!event.touches.length) return;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (event) => {
      if (touchStartY === null || !event.changedTouches.length) return;
      const delta = touchStartY - event.changedTouches[0].clientY;
      if (Math.abs(delta) > 24) {
        handleStep(delta);
      }
      touchStartY = null;
    }, { passive: true });

    renderStage(currentStage);
  </script>
</body>
</html>
