<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corgi Capital</title>
  <meta name="description" content="Corgi Capital" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0b0b0b;
      --ivory: #f3efe6;
      --gold: #c7a36a;
      --gold-soft: #a88952;
      --gold-dim: rgba(199, 163, 106, 0.56);
      --gold-line: rgba(199, 163, 106, 0.24);
      --edge-shadow: rgba(0, 0, 0, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--ivory);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Playfair Display', serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.028), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0) 38%),
        var(--black);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 54%, var(--edge-shadow) 100%);
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      z-index: 4;
      opacity: 0;
      animation: fadeIn 0.9s ease 0.9s forwards;
    }

    .c-tl { top: 16px; left: 16px; border-top: 1px solid var(--gold-line); border-left: 1px solid var(--gold-line); }
    .c-tr { top: 16px; right: 16px; border-top: 1px solid var(--gold-line); border-right: 1px solid var(--gold-line); }
    .c-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--gold-line); border-left: 1px solid var(--gold-line); }
    .c-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--gold-line); border-right: 1px solid var(--gold-line); }

    .shell {
      position: relative;
      z-index: 2;
      min-height: 200vh;
    }

    .hero {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(22px, 4vw, 44px) clamp(20px, 5vw, 72px) clamp(24px, 4vw, 40px);
    }

    .top,
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      font-family: 'Inconsolata', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(9px, 0.8vw, 12px);
      color: var(--gold-dim);
      opacity: 0;
      animation: fadeUp 0.95s cubic-bezier(.16,1,.3,1) forwards;
    }

    .top { animation-delay: 0.15s; }
    .bottom { align-items: flex-end; animation-delay: 0.3s; }

    .wordmark,
    .meta,
    .contact {
      position: relative;
    }

    .wordmark {
      color: var(--gold);
      letter-spacing: 0.22em;
      white-space: nowrap;
    }

    .meta {
      line-height: 1.85;
      white-space: nowrap;
    }

    .contact {
      color: var(--gold-dim);
      text-decoration: none;
      padding-bottom: 4px;
      white-space: nowrap;
      transition: color 0.25s ease;
    }

    .contact::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.35s cubic-bezier(.16,1,.3,1);
    }

    .contact:hover {
      color: var(--gold);
    }

    .contact:hover::after {
      width: 100%;
    }

    .wordmark:hover::after,
    .meta:hover::after,
    .contact:hover::before {
      content: "🐾";
      position: absolute;
      font-size: 11px;
      line-height: 1;
    }

    .wordmark:hover::after {
      margin-left: 7px;
      top: 0;
    }

    .meta:hover::after {
      margin-left: 8px;
      bottom: 2px;
    }

    .contact:hover::before {
      left: -18px;
      top: 1px;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-5vh);
      min-width: 0;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(199,163,106,0.82), transparent);
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
    }

    .divider.topline { margin-bottom: 34px; animation-delay: 0.55s; }
    .divider.bottomline { margin-top: 34px; animation-delay: 1.05s; }

    .headline {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(58px, 9.4vw, 154px);
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .headline .line {
      display: block;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.05s cubic-bezier(.16,1,.3,1) forwards;
    }

    .headline .line.one { animation-delay: 0.7s; }
    .headline .line.two {
      color: var(--gold);
      margin-top: 0.28em;
      letter-spacing: 0.05em;
      transition: opacity 0.6s ease, transform 0.6s ease;
      animation: none;
      opacity: 0;
      transform: translateY(28px);
      text-shadow: 0 0 18px rgba(199,163,106,0.08);
    }

    .headline.revealed .line.two {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-cue {
      margin-top: 18px;
      font-family: 'Inconsolata', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(9px, 0.75vw, 11px);
      color: rgba(199,163,106,0.5);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      animation: fadeUp 0.9s ease 1.1s forwards;
    }

    .headline.revealed + .scroll-cue {
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .tagline {
      margin-top: 28px;
      font-family: 'Inconsolata', monospace;
      text-transform: none;
      letter-spacing: 0.08em;
      font-size: clamp(12px, 1vw, 16px);
      color: var(--gold-soft);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .headline.revealed ~ .tagline {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.12s;
    }

    .spacer {
      height: 100vh;
      height: 100dvh;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.78; }
    }

    @media (min-width: 1440px) {
      .center { transform: translateY(-6vh); }
      .headline { font-size: min(9vw, 162px); }
    }

    @media (max-width: 900px) {
      .center { transform: translateY(-2vh); }
      .headline { font-size: clamp(52px, 10.6vw, 112px); }
    }

    @media (max-width: 640px) {
      .hero {
        padding: 22px 18px 24px;
      }

      .center {
        transform: none;
      }

      .headline {
        font-size: clamp(42px, 12.8vw, 78px);
        line-height: 0.95;
        letter-spacing: 0.04em;
      }

      .headline .line.two {
        margin-top: 0.36em;
      }

      .divider {
        height: 38px;
      }

      .divider.topline { margin-bottom: 24px; }
      .divider.bottomline { margin-top: 24px; }

      .top,
      .bottom {
        letter-spacing: 0.14em;
        font-size: 9px;
      }

      .corner {
        width: 18px;
        height: 18px;
      }

      .scroll-cue {
        margin-top: 16px;
      }

      .tagline {
        margin-top: 22px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="shell">
    <main class="hero">
      <header class="top">
        <div class="wordmark">Corgi Capital</div>
      </header>

      <section class="center" aria-label="Hero">
        <div class="divider topline"></div>

        <h1 class="headline" id="headline">
          <span class="line one">We Know Something</span>
          <span class="line two">You Don&apos;t</span>
        </h1>

        <div class="scroll-cue" id="scrollCue">Scroll</div>
        <div class="tagline">Selective Capital</div>

        <div class="divider bottomline"></div>
      </section>

      <footer class="bottom">
        <div class="meta">40.7128° N<br>74.0060° W</div>
        <a class="contact" href="mailto:hello@corgi-capital.com">hello@corgi-capital.com</a>
      </footer>
    </main>

    <div class="spacer" aria-hidden="true"></div>
  </div>

  <script>
    const headline = document.getElementById('headline');
    const revealAt = 80;

    function updateReveal() {
      if (window.scrollY >= revealAt) {
        headline.classList.add('revealed');
      } else {
        headline.classList.remove('revealed');
      }
    }

    updateReveal();
    window.addEventListener('scroll', updateReveal, { passive: true });
  </script>
</body>
</html>
