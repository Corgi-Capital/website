<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corgi Capital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #08090b;
      --paper: #e8e4da;
      --gold:  #b8965a;
      --dim:   #4a4540;
      --rule:  rgba(184,150,90,0.15);
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* ── canvas background ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── noise grain ── */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.045;
      pointer-events: none;
    }

    /* ── vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(8,9,11,0.65) 100%
      );
      pointer-events: none;
    }

    /* ── layout ── */
    .stage {
      position: relative; z-index: 3;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(28px, 5vw, 60px) clamp(28px, 6vw, 72px);
    }

    /* ── top bar ── */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 0.3s forwards;
    }

    .wordmark {
      font-size: clamp(10px, 1vw, 13px);
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .badge {
      font-family: 'Inconsolata', monospace;
      font-size: clamp(8px, 0.78vw, 10px);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid rgba(184,150,90,0.18);
      padding: 4px 11px 4px 9px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ── center ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin-bottom: 40px;
      height: 0;
      animation: growLine 1.2s cubic-bezier(.16,1,.3,1) 0.8s forwards;
    }
    .divider-bottom {
      margin-top: 40px;
      margin-bottom: 0;
      animation-delay: 1.6s;
    }

    .headline {
      font-size: clamp(56px, 9vw, 130px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.015em;
      color: var(--paper);
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(.16,1,.3,1) 0.9s forwards;
    }

    .headline em {
      font-style: italic;
      color: var(--gold);
      display: block;
      margin-top: 0.05em;
    }

    .sub {
      margin-top: 32px;
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      letter-spacing: 0.06em;
      line-height: 1.65;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(.16,1,.3,1) 1.1s forwards;
    }

    /* ── bottom bar ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 1.5s forwards;
    }

    .meta {
      font-family: 'Inconsolata', monospace;
      font-size: clamp(8px, 0.78vw, 10px);
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.14em;
      line-height: 1.8;
    }

    .contact {
      font-family: 'Inconsolata', monospace;
      font-size: clamp(8px, 0.78vw, 10px);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
    }

    .contact::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.4s cubic-bezier(.16,1,.3,1);
    }
    .contact:hover { color: var(--gold); }
    .contact:hover::after { width: 100%; }

    /* ── corner marks ── */
    .corner {
      position: fixed;
      width: 20px; height: 20px;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }
    .c-tl { top: 22px; left: 22px; border-top: 1px solid rgba(184,150,90,0.4); border-left: 1px solid rgba(184,150,90,0.4); }
    .c-tr { top: 22px; right: 22px; border-top: 1px solid rgba(184,150,90,0.4); border-right: 1px solid rgba(184,150,90,0.4); }
    .c-bl { bottom: 22px; left: 22px; border-bottom: 1px solid rgba(184,150,90,0.4); border-left: 1px solid rgba(184,150,90,0.4); }
    .c-br { bottom: 22px; right: 22px; border-bottom: 1px solid rgba(184,150,90,0.4); border-right: 1px solid rgba(184,150,90,0.4); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes growLine {
      to { height: 52px; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="stage">
    <header class="top">
      <div class="wordmark">Corgi Capital</div>
      <div class="badge"><span class="badge-dot"></span>Stealth Mode</div>
    </header>

    <main class="center">
      <div class="divider"></div>
      <h1 class="headline">
        Information<br>has a<br><em>price.</em>
      </h1>
      <p class="sub">
        Systematic strategies. Inefficient markets.<br>
        Something is coming.
      </p>
      <div class="divider divider-bottom"></div>
    </main>

    <footer class="bottom">
      <div class="meta">
        40.7128° N &nbsp;/&nbsp; 74.0060° W<br>
        New York, NY
      </div>
      <a href="mailto:hello@corgi-capital.com" class="contact">hello@corgi-capital.com</a>
    </footer>
  </div>

  <script>
    // ── Particle field: slow-drifting nodes + faint connecting lines ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    const GOLD   = [184, 150, 90];
    const N      = 72;   // particle count
    const LINK_D = 180;  // max distance to draw a link
    const SPEED  = 0.18; // base drift speed

    let W, H, particles;

    function rand(a, b) { return a + Math.random() * (b - a); }

    class Particle {
      constructor() { this.reset(true); }

      reset(init) {
        this.x  = rand(0, W);
        this.y  = init ? rand(0, H) : (Math.random() < 0.5 ? -4 : H + 4);
        this.vx = rand(-SPEED, SPEED);
        this.vy = rand(-SPEED, SPEED);
        // ensure non-zero velocity
        if (Math.abs(this.vx) < 0.05) this.vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
        this.r  = rand(0.6, 1.6);
        this.alpha = rand(0.15, 0.55);
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) {
          this.reset(false);
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${this.alpha})`;
        ctx.fill();
      }
    }

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = Array.from({ length: N }, () => new Particle());
    }

    function drawLinks() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_D) {
            const t = 1 - dist / LINK_D;
            const alpha = t * t * 0.12; // squared falloff, stays subtle
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawLinks();
      for (const p of particles) { p.update(); p.draw(); }
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      resize();
      // reposition any out-of-bounds particles
      for (const p of particles) {
        if (p.x > W) p.x = rand(0, W);
        if (p.y > H) p.y = rand(0, H);
      }
    });

    init();
    loop();
  </script>

</body>
</html>
