<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corgi Capital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--black:#0b0b0b;
--ivory:#f3efe6;
--gold:#c7a36a;
--gold-soft:#a88952;
--gold-dim:rgba(199,163,106,.55);
--gold-line:rgba(199,163,106,.28);
}

*{box-sizing:border-box}

html,body{
margin:0;
background:var(--black);
color:var(--ivory);
font-family:"Cormorant Garamond",serif;
-webkit-font-smoothing:antialiased;
overflow-x:hidden;
}

/* warm dark background */
body{
background:
radial-gradient(circle at 50% 40%,rgba(255,255,255,.035),transparent 38%),
linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0) 40%),
var(--black);
}

body:after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:radial-gradient(circle at center,transparent 50%,rgba(0,0,0,.12) 100%);
}

.stage{
min-height:100vh;
display:grid;
grid-template-rows:auto 1fr auto;
padding:clamp(22px,4vw,48px) clamp(20px,5vw,72px);
position:relative;
z-index:2;
}

/* header */

.top,.bottom{
display:flex;
justify-content:space-between;
align-items:flex-start;
font-family:"Inconsolata",monospace;
text-transform:uppercase;
letter-spacing:.22em;
font-size:clamp(9px,.8vw,12px);
color:var(--gold-dim);
animation:fadeUp 1s ease forwards;
opacity:0;
}

.bottom{
align-items:flex-end;
animation-delay:1.2s;
}

.wordmark{
color:var(--gold);
letter-spacing:.22em;
position:relative;
}

.meta{
line-height:1.8;
position:relative;
}

.contact{
text-decoration:none;
color:var(--gold-dim);
position:relative;
padding-bottom:4px;
}

.contact:hover{
color:var(--gold);
}

.contact:after{
content:"";
position:absolute;
bottom:0;
left:0;
width:0;
height:1px;
background:var(--gold);
transition:.35s;
}

.contact:hover:after{width:100%}

/* paw hover */

.wordmark:hover:after,
.meta:hover:after,
.contact:hover:before{
content:"🐾";
position:absolute;
margin-left:6px;
font-size:11px;
}

.contact:hover:before{
left:-18px;
}

.meta:hover:after{
margin-left:8px;
}

/* hero */

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transform:translateY(-4vh);
}

.headline{
margin:0;
font-weight:300;
font-size:clamp(64px,10vw,176px);
line-height:.9;
letter-spacing:-.03em;
font-feature-settings:"liga" 1,"kern" 1;
text-wrap:balance;
}

.headline span,
.headline em{
font-style:italic;
color:var(--gold);
margin-top:.22em;
letter-spacing:-.018em;
text-shadow:0 0 18px rgba(199,163,106,.1);
animation-delay:1.2s;
}

.headline span:nth-child(1){animation-delay:.8s; letter-spacing:-.022em;}
.headline span:nth-child(2){animation-delay:1s; letter-spacing:-.028em;}

.headline em{
font-style:italic;
color:var(--gold);
margin-top:.2em;
text-shadow:0 0 18px rgba(199,163,106,.1);
animation-delay:1.2s;
}

.tagline{
margin-top:32px;
font-family:"Inconsolata",monospace;
letter-spacing:.22em;
font-size:clamp(10px,.9vw,14px);
text-transform:uppercase;
color:var(--gold-soft);
opacity:0;
animation:fadeUp 1s ease 1.8s forwards;
}

.divider{
width:1px;
background:linear-gradient(to bottom,transparent,var(--gold),transparent);
height:0;
opacity:.7;
animation:grow 1.2s cubic-bezier(.16,1,.3,1) forwards;
}

.topline{margin-bottom:36px;animation-delay:.7s}
.bottomline{margin-top:36px;animation-delay:1.4s}

/* corners */

.corner{
position:fixed;
width:26px;
height:26px;
border-color:var(--gold-line);
opacity:.8;
}

.c-tl{top:16px;left:16px;border-top:1px solid;border-left:1px solid}
.c-tr{top:16px;right:16px;border-top:1px solid;border-right:1px solid}
.c-bl{bottom:16px;left:16px;border-bottom:1px solid;border-left:1px solid}
.c-br{bottom:16px;right:16px;border-bottom:1px solid;border-right:1px solid}

/* animations */

@keyframes fadeUp{
from{opacity:0;transform:translateY(18px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes grow{
from{height:0;opacity:0}
to{height:54px;opacity:.7}
}

/* mobile */

@media(max-width:640px){

.center{transform:none}

.headline{
font-size:clamp(52px,15vw,90px);
line-height:.92;
}

.divider{height:40px}

.top,.bottom{
letter-spacing:.16em;
font-size:9px;
}

.corner{width:18px;height:18px}

}

</style>
</head>

<body>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<main class="stage">

<header class="top">
<div class="wordmark">Corgi Capital</div>
</header>

<section class="center">

<div class="divider topline"></div>

<h1 class="headline">
<span>We know</span>
<span>something</span>
<em>you don't.</em>
</h1>

<div class="divider bottomline"></div>

<div class="tagline">Selective capital.</div>

</section>

<footer class="bottom">

<div class="meta">
40.7128° N<br>
74.0060° W
</div>

<a class="contact" href="mailto:hello@corgi-capital.com">hello@corgi-capital.com</a>

</footer>

</main>

</body>
</html>
